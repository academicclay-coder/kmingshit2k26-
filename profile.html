<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friend Profile</title>

<link rel="stylesheet" href="style.css">

<style>

.profile{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background:white;
    color:black;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.profile img{
    width:100%;
    height:500px;
    object-fit:cover;
}

.info{
    padding:30px;
}

.info h2{
    margin-bottom:20px;
    font-size:35px;
}

.info p{
    font-size:20px;
    margin:10px 0;
}

.buttons{
    display:flex;
    gap:20px;
    margin-top:30px;
}

.buttons button{
    flex:1;
}

</style>

</head>
<body>

<header>

<h1 id="name"></h1>

<p>Friends Forever ❤️</p>

</header>

<div class="profile">

<img id="photo">

<div class="info">

<h2>About</h2>

<p id="description"></p>

<div class="buttons">

<button onclick="goLocation()">
🌍 Visit Location
</button>

<button onclick="history.back()">
⬅ Back
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
